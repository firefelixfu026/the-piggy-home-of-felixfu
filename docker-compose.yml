services:
  postgres:
    image: postgres:16-alpine
    container_name: felixfu_blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: felix_blog
      POSTGRES_USER: felix_blog
      POSTGRES_PASSWORD: felix_blog_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felix_blog -d felix_blog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: felixfu_blog_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://felix_blog:felix_blog_dev@postgres:5432/felix_blog
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:8080}
      AUTH_SECRET: ${AUTH_SECRET:-felix-blog-compose-dev-secret-change-me}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-604800}
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_CALLBACK_URL: ${GITHUB_OAUTH_CALLBACK_URL:-http://127.0.0.1:8000/api/auth/github/callback}
      GITHUB_ADMIN_LOGINS: ${GITHUB_ADMIN_LOGINS:-}
      GITHUB_ADMIN_EMAILS: ${GITHUB_ADMIN_EMAILS:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: felixfu_blog_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

