services:
  postgres:
    image: postgres:16-alpine
    container_name: felixfu_blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: felix_blog
      POSTGRES_USER: felix_blog
      POSTGRES_PASSWORD: felix_blog_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felix_blog -d felix_blog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

